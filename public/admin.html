<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Sworld Wall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060f1d;
      --panel: rgba(7, 18, 38, 0.82);
      --line: rgba(164, 193, 255, 0.16);
      --text: #f7fbff;
      --sub: #c8d7f4;
      --accent: #cfe0ff;
      --accent-2: #8fb0ff;
    }
    * { box-sizing: border-box; }
    body {
      font-family: Inter, sans-serif;
      margin: 0;
      min-height: 100vh;
      padding: 28px;
      color: var(--text);
      background:
        linear-gradient(rgba(4,10,20,.8), rgba(4,10,20,.92)),
        url('/sworld-stage.jpg') center/cover no-repeat fixed;
    }
    .shell {
      max-width: 1400px;
      margin: 0 auto;
      background: rgba(5, 15, 32, 0.55);
      border: 1px solid var(--line);
      border-radius: 30px;
      padding: 26px;
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .brand img {
      width: 52px;
      height: 52px;
      object-fit: contain;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 46px;
      line-height: 1;
      margin: 0 0 8px;
    }
    .muted { color: var(--sub); }
    .stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
      color: var(--sub);
      font-size: 14px;
    }
    .card {
      display:flex;
      gap:18px;
      align-items:center;
      background: rgba(255,255,255,0.05);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      margin-bottom:14px;
      box-shadow: 0 10px 30px rgba(0,0,0,.16);
    }
    img.preview {
      width:82px;
      height:82px;
      object-fit:cover;
      border-radius:14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: #10203c;
    }
    .meta {
      flex: 1;
      min-width: 0;
    }
    .name { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .tag { color: var(--accent); font-weight: 600; }
    .message { color: var(--sub); margin-top: 4px; }
    .hint { font-size: 12px; color: var(--sub); margin-top: 6px; }
    button {
      background: linear-gradient(135deg, #dbe7ff, #9fbbff);
      color: #12203c;
      border:0;
      border-radius:12px;
      padding:10px 16px;
      cursor:pointer;
      font-weight:700;
    }
    .empty {
      padding: 24px;
      border-radius: 18px;
      border: 1px dashed var(--line);
      color: var(--sub);
      text-align: center;
      background: rgba(255,255,255,0.04);
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div>
        <div class="brand">
          <img src="/sworld-logo.png" alt="Sworld logo" />
          <div>
            <div class="muted">Sworld Admin Portal</div>
            <h1>Admin Panel</h1>
          </div>
        </div>
        <p class="muted">Manage guest cards shown on the main screen.</p>
      </div>
      <div class="stats">
        <div class="pill" id="countPill">0 profiles</div>
        <div class="pill">Display auto-rotates every 15 seconds</div>
        <div class="pill">Portal auto-refreshes every 5 seconds</div>
      </div>
    </div>

    <div id="list"></div>
  </div>

  <script>
    async function load() {
      const res = await fetch('/api/entries');
      const items = await res.json();
      const list = document.getElementById('list');
      document.getElementById('countPill').textContent = `${items.length} profiles`;

      if (!items.length) {
        list.innerHTML = '<div class="empty">No profiles yet. Guest submissions will appear here automatically.</div>';
        return;
      }

      list.innerHTML = items.map((item, idx) => `
        <div class="card">
          <img class="preview" src="${item.photo || '/default-avatar.png'}" alt="${item.name}" />
          <div class="meta">
            <div class="name">${item.name} <span class="tag">— @${item.ig}</span></div>
            <div class="message">${item.message || 'No message added'}</div>
            <div class="hint">Display order slot: ${idx + 1}</div>
          </div>
          <button onclick="removeItem('${item.id}')">Delete</button>
        </div>
      `).join('');
    }

    async function removeItem(id) {
      await fetch('/api/entries/' + id, { method: 'DELETE' });
      load();
    }

    load();
    setInterval(load, 20000);
  </script>
</body>
</html>
