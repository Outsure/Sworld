<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>Welcome to Sworld</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --font-th: 'Prompt', sans-serif;
      --font-en-body: 'Montserrat', sans-serif;
      --font-en-heading: 'Feeling Passionate', 'Montserrat', sans-serif;

      --bg: #002c67;
      --panel: rgba(255,255,255,0.10);
      --line: rgba(255,255,255,0.25);
      --text: #ffffff;
      --sub: rgba(255,255,255,0.85);
      --accent: #ffffff;
      --accent-2: #dbe8ff;
      --button-text: #002c67;
      --success-bg: rgba(255,255,255,0.15);
      --success-text: #ffffff;
      --danger-bg: rgba(255, 120, 120, 0.14);
      --danger-text: #ffc8c8;
    }

    @font-face {
      font-family: 'Feeling Passionate';
      src: url('/fonts/feeling-passionate.woff2') format('woff2'),
           url('/fonts/feeling-passionate.woff') format('woff');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      height: 100%;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100%;
      font-family: var(--font-th), var(--font-en-body), sans-serif;
      color: var(--text);
      background:
        linear-gradient(rgba(0,44,103,0.28), rgba(0,44,103,0.38)),
        url('/sworld-stage.jpg') center/cover no-repeat fixed;
      padding:
        max(18px, env(safe-area-inset-top))
        16px
        max(22px, env(safe-area-inset-bottom))
        16px;
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
      overscroll-behavior-y: contain;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      z-index: 0;
      background-image:
        radial-gradient(2px 2px at 12% 18%, rgba(255,255,255,0.95), transparent 55%),
        radial-gradient(1.5px 1.5px at 25% 30%, rgba(255,255,255,0.75), transparent 55%),
        radial-gradient(2px 2px at 44% 14%, rgba(201,224,255,0.8), transparent 55%),
        radial-gradient(1.5px 1.5px at 62% 24%, rgba(255,255,255,0.82), transparent 55%),
        radial-gradient(2px 2px at 77% 12%, rgba(255,255,255,0.8), transparent 55%),
        radial-gradient(1.5px 1.5px at 85% 32%, rgba(201,224,255,0.75), transparent 55%),
        radial-gradient(2px 2px at 92% 20%, rgba(255,255,255,0.9), transparent 55%);
      opacity: 0.8;
    }

    body::after {
      z-index: 0;
      background: radial-gradient(circle at center, rgba(120,162,255,0.09), transparent 45%);
    }

    /* ชั้นดาวด้านหลังกล่อง */
.sparkle-rain-back{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
  overflow:hidden;
}

.sparkle-rain-front{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:6;
  overflow:hidden;
}

/* ดาว */

.sparkle{
  position:absolute;
  top:-12%;
  width:20px;
  height:20px;
  opacity:0;
  will-change: transform, opacity;

  animation:
  starFall 10s linear infinite,
  starTwinkle 2.6s ease-in-out infinite;
}

/* ตัวดาว */

.sparkle::before{
  content:"✦";
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  color:white;

  text-shadow:
  0 0 8px rgba(255,255,255,1),
  0 0 18px rgba(255,255,255,.9),
  0 0 36px rgba(219,232,255,.8);
}

/* ดาวใหญ่ */

.sparkle.big::before{
  font-size:30px;
}

/* ดาวเล็ก */

.sparkle.small::before{
  font-size:16px;
}

/* ดาวด้านหน้า */

.sparkle.front::before{
  text-shadow:
  0 0 10px rgba(255,255,255,1),
  0 0 24px rgba(255,255,255,.9),
  0 0 44px rgba(219,232,255,.9);
}

/* ดาวด้านหลัง */

.sparkle.back{
  filter:blur(.2px);
}

/* หางดาว */

.sparkle.trail::after{
  content:"";
  position:absolute;
  top:50%;
  left:50%;
  width:2px;
  height:80px;

  background:linear-gradient(
    to bottom,
    rgba(255,255,255,.8),
    rgba(255,255,255,0)
  );

  transform:translate(-50%,0);
  opacity:.7;
  filter:blur(.5px);
}

/* ตำแหน่งดาว */

.b1{left:5%;animation-delay:0s;}
.b2{left:14%;animation-delay:1.7s;}
.b3{left:22%;animation-delay:3.4s;}
.b4{left:31%;animation-delay:.9s;}
.b5{left:40%;animation-delay:4.3s;}
.b6{left:52%;animation-delay:2.1s;}
.b7{left:63%;animation-delay:5s;}
.b8{left:74%;animation-delay:1.1s;}
.b9{left:85%;animation-delay:3s;}
.b10{left:94%;animation-delay:5.8s;}

.f1{left:9%;animation-delay:.7s;}
.f2{left:19%;animation-delay:2.4s;}
.f3{left:28%;animation-delay:4.8s;}
.f4{left:37%;animation-delay:1.3s;}
.f5{left:49%;animation-delay:3.5s;}
.f6{left:58%;animation-delay:.2s;}
.f7{left:68%;animation-delay:5.2s;}
.f8{left:79%;animation-delay:2.8s;}
.f9{left:89%;animation-delay:4.1s;}

/* ดาวตก */

@keyframes starFall{

0%{
transform:translate3d(0,-14vh,0) rotate(0deg) scale(.9);
opacity:0;
}

8%{
opacity:1;
}

100%{
transform:translate3d(-40px,120vh,0) rotate(720deg) scale(1.1);
opacity:0;
}

}

/* กระพริบ */

@keyframes starTwinkle{

0%,100%{
filter:brightness(1);
}

50%{
filter:brightness(1.6);
}

}

    .page {
      min-height: calc(100vh - 32px);
      display: grid;
      place-items: center;
      position: relative;
      z-index: 3;
    }

    .wrap {
      width: 100%;
      max-width: 580px;
      background: var(--panel);
      border: 1px solid var(--line);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 30px;
      padding: 28px;
      box-shadow: 0 30px 90px rgba(0,0,0,0.45);
      position: relative;
      z-index: 3;
    }

    .wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.06),
        rgba(255,255,255,0.015) 24%,
        transparent 55%
      );
    }

    .wrap::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      pointer-events: none;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 0 40px rgba(148,189,255,0.08);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
      position: relative;
      z-index: 4;
    }

    .brand img {
      width: 74px;
      height: 74px;
      object-fit: contain;
      filter: drop-shadow(0 6px 20px rgba(143,176,255,0.18));
      flex-shrink: 0;
      animation: logoFloat 5.5s ease-in-out infinite;
    }

    .brand small {
      color: var(--sub);
      display: block;
      margin-bottom: 4px;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-size: 12px;
      font-family: var(--font-en-body);
    }

    .brand strong {
      font-size: 22px;
      font-weight: 800;
      font-family: var(--font-en-body);
    }

    h1 {
      font-family: var(--font-en-heading);
      margin: 0 0 8px;
      font-size: clamp(34px, 5vw, 46px);
      line-height: 1.02;
      font-weight: normal;
      text-shadow:
        0 0 12px rgba(255,255,255,0.10),
        0 0 30px rgba(219,232,255,0.10);
      animation: titleGlow 5.2s ease-in-out infinite;
      position: relative;
      z-index: 4;
    }

    p {
      color: var(--sub);
      margin: 0 0 24px;
      font-size: 16px;
      line-height: 1.5;
      font-family: var(--font-en-body);
      position: relative;
      z-index: 4;
    }

    .grid {
      display: grid;
      gap: 14px;
      position: relative;
      z-index: 4;
    }

    label {
      font-size: 14px;
      color: #f6f8ff;
      display: block;
      font-family: var(--font-en-body);
    }

    input,
    textarea {
      width: 100%;
      margin-top: 8px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.06);
      color: white;
      border-radius: 16px;
      padding: 15px 16px;
      font-size: 16px;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      font-family: var(--font-th), var(--font-en-body), sans-serif;
      position: relative;
      z-index: 4;
    }

    input::placeholder,
    textarea::placeholder {
      color: rgba(233, 240, 255, 0.4);
      font-family: var(--font-th), var(--font-en-body), sans-serif;
    }

    input:focus,
    textarea:focus {
      border-color: rgba(143,176,255,0.6);
      box-shadow: 0 0 0 4px rgba(143,176,255,0.12);
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .file-input {
      padding: 12px;
      min-height: 54px;
    }

    .file-meta {
      display: none;
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.10);
      color: var(--sub);
      font-size: 13px;
      line-height: 1.5;
      font-family: var(--font-en-body);
    }

    .file-meta.show {
      display: block;
    }

    .progress-wrap {
      display: none;
      margin-top: 8px;
      gap: 8px;
    }

    .progress-wrap.show {
      display: grid;
    }

    .progress-label {
      font-size: 13px;
      color: var(--sub);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-family: var(--font-en-body);
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ffffff, #dbe8ff);
      transition: width .18s ease;
    }

    button {
      border: 0;
      width: 100%;
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 16px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: var(--button-text);
      cursor: pointer;
      margin-top: 8px;
      box-shadow: 0 14px 34px rgba(82, 126, 214, 0.22);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 56px;
      transition: transform .15s ease, opacity .2s ease;
      touch-action: manipulation;
      font-family: var(--font-en-body);
      position: relative;
      z-index: 4;
    }

    button:active {
      transform: scale(0.995);
    }

    button:disabled {
      opacity: 0.72;
      cursor: not-allowed;
    }

    .loader {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(0,44,103,0.25);
      border-top-color: #002c67;
      border-radius: 50%;
      display: none;
      animation: spin .8s linear infinite;
    }

    .loader.show {
      display: inline-block;
    }

    .ok,
    .err {
      display: none;
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.5;
      font-family: var(--font-th), var(--font-en-body), sans-serif;
      position: relative;
      z-index: 4;
    }

    .ok {
      background: var(--success-bg);
      color: var(--success-text);
    }

    .err {
      background: var(--danger-bg);
      color: var(--danger-text);
    }

    .note {
      margin-top: 14px;
      font-size: 13px;
      color: var(--sub);
      line-height: 1.5;
      font-family: var(--font-en-body);
      position: relative;
      z-index: 4;
    }

    @keyframes sparkleFall {
      0% {
        transform: translate3d(0, -14vh, 0) scale(.85) rotate(0deg);
        opacity: 0;
      }
      8% {
        opacity: .95;
      }
      50% {
        opacity: .8;
      }
      100% {
        transform: translate3d(-24px, 120vh, 0) scale(1.1) rotate(18deg);
        opacity: 0;
      }
    }

    @keyframes logoFloat {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-4px);
      }
    }

    @keyframes titleGlow {
      0%, 100% {
        opacity: 0.96;
      }
      50% {
        opacity: 1;
      }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 640px) {
      body {
        padding:
          max(12px, env(safe-area-inset-top))
          12px
          max(18px, env(safe-area-inset-bottom))
          12px;
        background:
          linear-gradient(rgba(0,44,103,0.28), rgba(0,44,103,0.38)),
          url('/sworld-stage.jpg') center/cover no-repeat;
      }

      .page {
        min-height: auto;
        display: block;
      }

      .wrap {
        border-radius: 24px;
        padding: 20px 18px;
        margin: 4px 0 18px;
      }

      .brand img {
        width: 82px;
        height: 82px;
      }

      h1 {
        font-size: clamp(30px, 9vw, 40px);
      }

      input,
      textarea,
      .file-input,
      button {
        font-size: 16px;
      }

      label {
        font-size: 15px;
      }

      .sparkle {
        width: 12px;
        height: 12px;
      }

      .sparkle.big {
        width: 18px;
        height: 18px;
      }

      .sparkle.small {
        width: 10px;
        height: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="sparkle-rain-back" aria-hidden="true">
    <span class="sparkle back big b1"></span>
    <span class="sparkle back b2"></span>
    <span class="sparkle back small b3"></span>
    <span class="sparkle back big b4"></span>
    <span class="sparkle back b5"></span>
    <span class="sparkle back small b6"></span>
    <span class="sparkle back big b7"></span>
    <span class="sparkle back b8"></span>
    <span class="sparkle back small b9"></span>
    <span class="sparkle back big b10"></span>
  </div>

  <div class="page">
    <div class="wrap">
      <div class="brand">
        <img src="/sworld-logo.png" alt="Sworld logo" />
        <div>
          <small>Wedding Night</small>
          <strong>Sworld</strong>
        </div>
      </div>

      <h1>Welcome to Sworld</h1>
      <p>Add your IG and photo so it can appear on the wedding screen.</p>

      <form id="joinForm" class="grid" novalidate>
        <label>
          Your name
          <input id="nameInput" name="name" placeholder="e.g. Vee" required maxlength="60" />
        </label>

        <label>
          IG Name (*Optional)
          <input id="igInput" name="ig" placeholder="e.g. Sworld_ig" maxlength="60" />
        </label>

        <label>
          Your message
          <textarea
            id="message"
            name="message"
            placeholder="เขียนคำอวยพร หรือข้อความสั้นๆ ได้ตามสบาย"
            maxlength="250"
          ></textarea>
        </label>

        <label>
          Upload photo
          <input
            id="photoInput"
            class="file-input"
            type="file"
            name="photo"
            accept="image/*"
          />
          <div id="fileMeta" class="file-meta"></div>
        </label>

        <div id="progressWrap" class="progress-wrap" aria-live="polite">
          <div class="progress-label">
            <span id="progressText">Preparing upload...</span>
            <span id="progressPercent">0%</span>
          </div>
          <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
          </div>
        </div>

        <button type="submit" id="submitBtn">
          <span id="submitText">Join to Sworld</span>
          <span id="submitLoader" class="loader"></span>
        </button>
      </form>

      <div class="ok" id="okBox">Submitted successfully. Your profile is ready for the screen ✨</div>
      <div class="err" id="errBox"></div>
      <div class="note">Tip: Open <b>/sworld/display</b> on the big screen and let guests scan the QR shown there.</div>
    </div>
  </div>

  <div class="sparkle-rain-front" aria-hidden="true">
    <span class="sparkle front big f1"></span>
    <span class="sparkle front f2"></span>
    <span class="sparkle front small f3"></span>
    <span class="sparkle front big f4"></span>
    <span class="sparkle front f5"></span>
    <span class="sparkle front big f6"></span>
    <span class="sparkle front small f7"></span>
    <span class="sparkle front f8"></span>
    <span class="sparkle front big f9"></span>
  </div>

  <script>
    const form = document.getElementById('joinForm');
    const okBox = document.getElementById('okBox');
    const errBox = document.getElementById('errBox');

    const submitBtn = document.getElementById('submitBtn');
    const submitText = document.getElementById('submitText');
    const submitLoader = document.getElementById('submitLoader');

    const photoInput = document.getElementById('photoInput');
    const fileMeta = document.getElementById('fileMeta');

    const progressWrap = document.getElementById('progressWrap');
    const progressText = document.getElementById('progressText');
    const progressPercent = document.getElementById('progressPercent');
    const progressFill = document.getElementById('progressFill');

    const nameInput = document.getElementById('nameInput');
    const igInput = document.getElementById('igInput');
    const messageInput = document.getElementById('message');

    let isSubmitting = false;
    let compressedFile = null;

    function bytesToMB(bytes) {
      return (bytes / (1024 * 1024)).toFixed(2);
    }

    function showError(message) {
      okBox.style.display = 'none';
      errBox.textContent = message;
      errBox.style.display = 'block';
    }

    function hideMessages() {
      okBox.style.display = 'none';
      errBox.style.display = 'none';
    }

    function setSubmitState(loading, text) {
      submitBtn.disabled = loading;
      submitText.textContent = text;
      submitLoader.classList.toggle('show', loading);
    }

    function setProgress(percent, text) {
      const safePercent = Math.max(0, Math.min(100, Math.round(percent || 0)));
      progressWrap.classList.add('show');
      progressFill.style.width = `${safePercent}%`;
      progressPercent.textContent = `${safePercent}%`;
      progressText.textContent = text || 'Uploading...';
    }

    function hideProgress() {
      progressWrap.classList.remove('show');
      progressFill.style.width = '0%';
      progressPercent.textContent = '0%';
      progressText.textContent = 'Preparing upload...';
    }

    function updateFileMeta(message) {
      if (!message) {
        fileMeta.classList.remove('show');
        fileMeta.textContent = '';
        return;
      }

      fileMeta.textContent = message;
      fileMeta.classList.add('show');
    }

    function normalizeIgValue(value) {
      return String(value || '').trim().replace(/^@+/, '');
    }

    function validateForm() {
      const name = String(nameInput.value || '').trim();
      const ig = normalizeIgValue(igInput.value);
      const message = String(messageInput.value || '').trim();

      if (!name) {
        throw new Error('Please enter your name');
      }

      if (name.length > 60) {
        throw new Error('Name is too long');
      }

      if (ig.length > 60) {
        throw new Error('IG name is too long');
      }

      if (message.length > 250) {
        throw new Error('Message is too long');
      }

      return { name, ig, message };
    }

    async function compressImage(file) {
      return new Promise((resolve, reject) => {
        if (!file || !file.type.startsWith('image/')) {
          reject(new Error('กรุณาเลือกไฟล์รูปภาพ'));
          return;
        }

        const reader = new FileReader();
        const img = new Image();

        reader.onload = (e) => {
          img.onload = () => {
            const maxWidth = 1600;
            const maxHeight = 2000;

            let { width, height } = img;

            const widthRatio = maxWidth / width;
            const heightRatio = maxHeight / height;
            const scale = Math.min(1, widthRatio, heightRatio);

            width = Math.round(width * scale);
            height = Math.round(height * scale);

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;

            const ctx = canvas.getContext('2d');
            if (!ctx) {
              reject(new Error('ไม่สามารถประมวลผลรูปได้'));
              return;
            }

            ctx.drawImage(img, 0, 0, width, height);

            canvas.toBlob(
              (blob) => {
                if (!blob) {
                  reject(new Error('ไม่สามารถย่อรูปได้'));
                  return;
                }

                const safeName = (file.name || 'upload').replace(/\.[^.]+$/, '') + '.jpg';
                const newFile = new File([blob], safeName, { type: 'image/jpeg' });
                resolve(newFile);
              },
              'image/jpeg',
              0.82
            );
          };

          img.onerror = () => reject(new Error('ไฟล์รูปไม่ถูกต้อง'));
          img.src = e.target.result;
        };

        reader.onerror = () => reject(new Error('ไม่สามารถอ่านไฟล์ได้'));
        reader.readAsDataURL(file);
      });
    }

    photoInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      compressedFile = null;
      hideMessages();

      if (!file) {
        updateFileMeta('');
        return;
      }

      try {
        setProgress(5, 'Preparing image...');
        setSubmitState(true, 'Preparing image...');

        const originalSize = bytesToMB(file.size);
        compressedFile = await compressImage(file);

        const compressedSize = bytesToMB(compressedFile.size);
        updateFileMeta(`Ready: ${file.name} • ${originalSize} MB → ${compressedSize} MB`);
        setProgress(100, 'Image ready');
      } catch (error) {
        photoInput.value = '';
        compressedFile = null;
        updateFileMeta('');
        showError(error.message || 'ไม่สามารถย่อรูปได้ กรุณาลองใหม่');
      } finally {
        setTimeout(() => {
          if (!isSubmitting) {
            hideProgress();
            setSubmitState(false, 'Join to Sworld');
          }
        }, 400);
      }
    });

    function uploadWithProgress(formData) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/api/entries');

        xhr.upload.onprogress = (e) => {
          if (e.lengthComputable) {
            const percent = Math.round((e.loaded / e.total) * 100);
            setProgress(percent, percent < 100 ? 'Uploading...' : 'Processing...');
            submitText.textContent = `Uploading ${percent}%`;
          }
        };

        xhr.onload = () => {
          let data = {};
          try {
            data = xhr.responseText ? JSON.parse(xhr.responseText) : {};
          } catch (_err) {}

          if (xhr.status >= 200 && xhr.status < 300) {
            resolve(data);
          } else {
            reject(new Error(data.error || 'Submit failed'));
          }
        };

        xhr.onerror = () => reject(new Error('Network error. Please try again.'));
        xhr.send(formData);
      });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      if (isSubmitting) return;

      try {
        validateForm();
      } catch (error) {
        showError(error.message);
        return;
      }

      isSubmitting = true;
      setSubmitState(true, 'Preparing...');
      setProgress(0, 'Preparing upload...');

      try {
        const formData = new FormData(form);

        const normalizedIg = normalizeIgValue(igInput.value);
        formData.set('ig', normalizedIg || '');

        if (compressedFile) {
          formData.set('photo', compressedFile);
        } else {
          const rawFile = photoInput.files[0];
          if (rawFile) {
            setProgress(10, 'Preparing image...');
            submitText.textContent = 'Preparing image...';

            const originalSizeMB = parseFloat(bytesToMB(rawFile.size));
            if (originalSizeMB > 20) {
              throw new Error('รูปต้นฉบับมีขนาดใหญ่เกินไป กรุณาเลือกรูปใหม่');
            }

            compressedFile = await compressImage(rawFile);
            formData.set('photo', compressedFile);

            updateFileMeta(
              `Ready: ${rawFile.name} • ${bytesToMB(rawFile.size)} MB → ${bytesToMB(compressedFile.size)} MB`
            );
          }
        }

        submitText.textContent = 'Uploading 0%';
        await uploadWithProgress(formData);

        setProgress(100, 'Done');
        submitText.textContent = 'Submitted';
        okBox.style.display = 'block';

        form.reset();
        compressedFile = null;
        updateFileMeta('');
      } catch (error) {
        showError(error.message || 'Submit failed');
      } finally {
        isSubmitting = false;

        setTimeout(() => {
          hideProgress();
          setSubmitState(false, 'Join to Sworld');
        }, 600);
      }
    });

    ['touchstart', 'touchmove', 'wheel'].forEach((eventName) => {
      document.addEventListener(eventName, () => {}, { passive: true });
    });
  </script>
</body>
</html>
