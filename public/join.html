<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome Sworld Wall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
    --bg: #002c67;
    --panel: rgba(255,255,255,0.10);
    --line: rgba(255,255,255,0.25);
    --text: #ffffff;
    --sub: rgba(255,255,255,0.85);
    --accent: #ffffff;
    --accent-2: #dbe8ff;
    --button-text: #002c67;
    --success-bg: rgba(255,255,255,0.15);
    --success-text: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, sans-serif;
      color: var(--text);
  background:
    linear-gradient(rgba(0,44,103,0.28), rgba(0,44,103,0.38)),
    url('/sworld-stage.jpg') center/cover no-repeat fixed;
      display: grid;
      place-items: center;
      padding: 28px;
      position: relative;
      overflow: hidden;
    }
    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
    }
    body::before {
      background-image:
        radial-gradient(2px 2px at 12% 18%, rgba(255,255,255,0.95), transparent 55%),
        radial-gradient(1.5px 1.5px at 25% 30%, rgba(255,255,255,0.75), transparent 55%),
        radial-gradient(2px 2px at 44% 14%, rgba(201,224,255,0.8), transparent 55%),
        radial-gradient(1.5px 1.5px at 62% 24%, rgba(255,255,255,0.82), transparent 55%),
        radial-gradient(2px 2px at 77% 12%, rgba(255,255,255,0.8), transparent 55%),
        radial-gradient(1.5px 1.5px at 85% 32%, rgba(201,224,255,0.75), transparent 55%),
        radial-gradient(2px 2px at 92% 20%, rgba(255,255,255,0.9), transparent 55%);
      opacity: 0.8;
    }
    body::after {
      background: radial-gradient(circle at center, rgba(120,162,255,0.09), transparent 45%);
    }
    .wrap {
      width: 100%;
      max-width: 580px;
      background: var(--panel);
      border: 1px solid var(--line);
      backdrop-filter: blur(14px);
      border-radius: 30px;
      padding: 30px;
      box-shadow: 0 30px 90px rgba(0,0,0,0.45);
      position: relative;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }
    .brand img {
      width: 56px;
      height: 56px;
      object-fit: contain;
      filter: drop-shadow(0 6px 20px rgba(143,176,255,0.18));
    }
    .brand small {
      color: var(--sub);
      display: block;
      margin-bottom: 2px;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-size: 12px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      margin: 0 0 8px;
      font-size: clamp(34px, 5vw, 46px);
      line-height: 1.02;
    }
    p { color: var(--sub); margin: 0 0 24px; }
    .grid { display: grid; gap: 14px; }
    label { font-size: 14px; color: #f6f8ff; }
    input, textarea {
      width: 100%;
      margin-top: 8px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.06);
      color: white;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 16px;
      outline: none;
    }
    input::placeholder, textarea::placeholder { color: rgba(233, 240, 255, 0.4); }
    input:focus, textarea:focus {
      border-color: rgba(143,176,255,0.6);
      box-shadow: 0 0 0 4px rgba(143,176,255,0.12);
    }
    textarea { min-height: 96px; resize: vertical; }
    input[type=file] { padding: 10px 12px; }
    button {
      border: 0;
      width: 100%;
      border-radius: 18px;
      padding: 15px 18px;
      font-size: 16px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: var(--button-text);
      cursor: pointer;
      margin-top: 8px;
      box-shadow: 0 14px 34px rgba(82, 126, 214, 0.22);
    }
    .note { margin-top: 14px; font-size: 13px; color: var(--sub); }
    .ok, .err {
      display: none;
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 14px;
      font-size: 14px;
    }
    .ok { background: var(--success-bg); color: var(--success-text); }
    .err { background: rgba(255, 120, 120, 0.14); color: #ffc8c8; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <img src="/sworld-logo.png" alt="Sworld logo" />
      <div>
        <small>Wedding Night</small>
        <strong>Sworld</strong>
      </div>
    </div>

    <h1>Welcome Sworld Wall</h1>
    <p>Add your IG and photo so it can appear on the wedding screen.</p>

    <form id="joinForm" class="grid">
      <label>
        Your name
        <input name="name" placeholder="e.g. Vee" required />
      </label>

      <label>
        IG Name
        <input name="ig" placeholder="e.g. Vee_ig" required />
      </label>

      <label>
        Short message
        <textarea name="message" placeholder="Optional message for the couple"></textarea>
      </label>

      <label>
        Upload your photo
        <input type="file" name="photo" accept="image/*" />
      </label>

      <button type="submit">Join Sworld Wall</button>
    </form>

    <div class="ok" id="okBox">Submitted successfully. Your profile is ready for the screen ✨</div>
    <div class="err" id="errBox"></div>
    <div class="note">Tip: Open <b>/sworld/display</b> on the big screen and let guests scan the QR shown there.</div>
  </div>

  <script>
    const form = document.getElementById('joinForm');
    const okBox = document.getElementById('okBox');
    const errBox = document.getElementById('errBox');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      okBox.style.display = 'none';
      errBox.style.display = 'none';

      const formData = new FormData(form);
      try {
        const res = await fetch('/api/entries', { method: 'POST', body: formData });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Submit failed');
        okBox.style.display = 'block';
        form.reset();
      } catch (error) {
        errBox.textContent = error.message;
        errBox.style.display = 'block';
      }
    });
  </script>
</body>
</html>
