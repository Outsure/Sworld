<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Welcome to Sworld</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --font-th: 'Prompt', sans-serif;
      --font-en-body: 'Montserrat', sans-serif;
      --font-en-heading: 'Feeling Passionate', 'Montserrat', sans-serif;

      --bg: #002c67;
      --panel: rgba(255,255,255,0.06);
      --line: rgba(255,255,255,0.25);
      --text: #ffffff;
      --sub: rgba(255,255,255,0.85);
      --accent: #ffffff;
      --accent-2: #dbe8ff;
      --button-text: #002c67;
      --success-bg: rgba(255,255,255,0.15);
      --success-text: #ffffff;
      --danger-bg: rgba(255, 120, 120, 0.14);
      --danger-text: #ffc8c8;

      --star-white: #ffffff;
      --star-ice: #dbe8ff;
      --star-gold: #ffe7a8;
    }

    @font-face {
      font-family: 'Feeling Passionate';
      src: url('/fonts/feeling-passionate.woff2') format('woff2'),
           url('/fonts/feeling-passionate.woff') format('woff');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      height: 100%;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100%;
      font-family: var(--font-th), var(--font-en-body), sans-serif;
      color: var(--text);
background:
  linear-gradient(rgba(0,44,103,0.28), rgba(0,44,103,0.38)),
  url('/sworld-stage.jpg') center/cover no-repeat;
background-attachment: scroll;
      padding:
        max(18px, env(safe-area-inset-top))
        16px
        16px
        16px;
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
      overscroll-behavior-y: contain;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      z-index: 0;
      background-image:
        radial-gradient(2px 2px at 12% 18%, rgba(255,255,255,0.95), transparent 55%),
        radial-gradient(1.5px 1.5px at 25% 30%, rgba(255,255,255,0.75), transparent 55%),
        radial-gradient(2px 2px at 44% 14%, rgba(201,224,255,0.8), transparent 55%),
        radial-gradient(1.5px 1.5px at 62% 24%, rgba(255,255,255,0.82), transparent 55%),
        radial-gradient(2px 2px at 77% 12%, rgba(255,255,255,0.8), transparent 55%),
        radial-gradient(1.5px 1.5px at 85% 32%, rgba(201,224,255,0.75), transparent 55%),
        radial-gradient(2px 2px at 92% 20%, rgba(255,255,255,0.9), transparent 55%);
      opacity: 0.8;
    }

    body::after {
      display: none;
    }

    .sparkle-rain-back,
    .sparkle-rain-front {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .sparkle-rain-back { z-index: 1; }
    .sparkle-rain-front { z-index: 10; }

    .sparkle {
      --fall-duration: 10s;
      --twinkle-duration: 2.5s;
      --spin-duration: 8s;
      --drift-x: -38px;
      --trail-height: 86px;
      --trail-width: 2px;
      --trail-opacity: 0.24;
      --trail-blur: 1px;

      position: absolute;
      top: -18%;
      width: 22px;
      height: 22px;
      opacity: 0;
      will-change: transform, opacity, filter;
      animation:
        starFall var(--fall-duration) linear infinite,
        starTwinkle var(--twinkle-duration) ease-in-out infinite;
    }

    .sparkle::before {
      content: "✦";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      line-height: 1;
      color: var(--star-white);
      transform-origin: center;
      animation: starSpin var(--spin-duration) linear infinite;
      text-shadow:
        0 0 10px rgba(255,255,255,0.96),
        0 0 20px rgba(255,255,255,0.74),
        0 0 36px rgba(219,232,255,0.72);
    }

    .sparkle.gold::before {
      color: var(--star-gold);
      text-shadow:
        0 0 10px rgba(255,231,168,0.96),
        0 0 20px rgba(255,211,110,0.70),
        0 0 36px rgba(255,211,110,0.48);
    }

    .sparkle.big::before { font-size: 32px; }
    .sparkle.small::before { font-size: 18px; }

    .sparkle.front::before {
      text-shadow:
        0 0 12px rgba(255,255,255,1),
        0 0 26px rgba(255,255,255,0.9),
        0 0 48px rgba(219,232,255,0.82);
    }

    .sparkle.front.gold::before {
      text-shadow:
        0 0 12px rgba(255,231,168,1),
        0 0 26px rgba(255,211,110,0.88),
        0 0 48px rgba(255,211,110,0.64);
    }

    .sparkle.back {
      filter: blur(0.15px);
      opacity: 0.92;
    }

    .sparkle.trail::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 52%;
      width: var(--trail-width);
      height: var(--trail-height);
      transform: translateX(-50%);
      transform-origin: bottom center;
      border-radius: 999px;
      opacity: var(--trail-opacity);
      filter: blur(var(--trail-blur));
      background: linear-gradient(
        to top,
        rgba(255,255,255,0.30) 0%,
        rgba(255,255,255,0.16) 28%,
        rgba(219,232,255,0.08) 58%,
        rgba(219,232,255,0) 100%
      );
    }

    .sparkle.trail.gold::after {
      background: linear-gradient(
        to top,
        rgba(255,231,168,0.26) 0%,
        rgba(255,211,110,0.15) 28%,
        rgba(255,211,110,0.07) 58%,
        rgba(255,211,110,0) 100%
      );
    }

    .d1 {
      --fall-duration: 8.8s;
      --twinkle-duration: 2s;
      --spin-duration: 6.4s;
      --drift-x: -54px;
      --trail-height: 118px;
      --trail-width: 3px;
      --trail-opacity: 0.34;
      --trail-blur: 0.8px;
    }

    .d2 {
      --fall-duration: 9.5s;
      --twinkle-duration: 2.4s;
      --spin-duration: 7.2s;
      --drift-x: -48px;
      --trail-height: 102px;
      --trail-width: 2.5px;
      --trail-opacity: 0.30;
      --trail-blur: 0.9px;
    }

    .d3 {
      --fall-duration: 10.4s;
      --twinkle-duration: 2.5s;
      --spin-duration: 8.1s;
      --drift-x: -42px;
      --trail-height: 90px;
      --trail-width: 2px;
      --trail-opacity: 0.25;
      --trail-blur: 1px;
    }

    .d4 {
      --fall-duration: 11.4s;
      --twinkle-duration: 2.9s;
      --spin-duration: 9.3s;
      --drift-x: -34px;
      --trail-height: 78px;
      --trail-width: 2px;
      --trail-opacity: 0.20;
      --trail-blur: 1.1px;
    }

    .d5 {
      --fall-duration: 12.3s;
      --twinkle-duration: 3.2s;
      --spin-duration: 10.4s;
      --drift-x: -28px;
      --trail-height: 66px;
      --trail-width: 1.8px;
      --trail-opacity: 0.16;
      --trail-blur: 1.2px;
    }

    .b1  { left: 6%;  animation-delay: 0s, .2s; }
    .b2  { left: 16%; animation-delay: 1.7s, .9s; }
    .b3  { left: 26%; animation-delay: 3.4s, .4s; }
    .b4  { left: 38%; animation-delay: .9s, 1.1s; }
    .b5  { left: 50%; animation-delay: 4.3s, .3s; }
    .b6  { left: 62%; animation-delay: 2.1s, .8s; }
    .b7  { left: 74%; animation-delay: 5s, .5s; }
    .b8  { left: 86%; animation-delay: 1.1s, 1.2s; }

    .f1  { left: 10%; animation-delay: .7s, .2s; }
    .f2  { left: 22%; animation-delay: 2.4s, .9s; }
    .f3  { left: 34%; animation-delay: 4.8s, .4s; }
    .f4  { left: 46%; animation-delay: 1.3s, 1.1s; }
    .f5  { left: 58%; animation-delay: 3.5s, .3s; }
    .f6  { left: 70%; animation-delay: .2s, .8s; }
    .f7  { left: 82%; animation-delay: 5.2s, .5s; }
    .f8  { left: 90%; animation-delay: 2.8s, 1.2s; }

    .page {
      min-height: auto;
      display: grid;
      place-items: center;
      position: relative;
      z-index: 3;
    }

    .wrap {
      width: 100%;
      max-width: 580px;
      background: var(--panel);
      border: 1px solid var(--line);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      border-radius: 30px;
      padding: 28px;
      box-shadow: 0 30px 90px rgba(0,0,0,0.45);
      position: relative;
      z-index: 3;
    }

    .wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.035),
        rgba(255,255,255,0.012) 24%,
        transparent 55%
      );
    }

    .wrap::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      pointer-events: none;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.06),
        0 0 24px rgba(148,189,255,0.06);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
      position: relative;
      z-index: 4;
    }

    .brand img {
      width: 74px;
      height: 74px;
      object-fit: contain;
      filter: drop-shadow(0 6px 20px rgba(143,176,255,0.18));
      flex-shrink: 0;
      animation: logoFloat 5.5s ease-in-out infinite;
    }

    .brand small {
      color: var(--sub);
      display: block;
      margin-bottom: 4px;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-size: 12px;
      font-family: var(--font-en-body);
    }

    .brand strong {
      font-size: 22px;
      font-weight: 800;
      font-family: var(--font-en-body);
    }

    h1 {
      font-family: var(--font-en-heading);
      margin: 0 0 8px;
      font-size: clamp(26px, 4vw, 34px);
      line-height: 1.02;
      font-weight: normal;
      text-shadow:
        0 0 12px rgba(255,255,255,0.10),
        0 0 30px rgba(219,232,255,0.10);
      animation: titleGlow 5.2s ease-in-out infinite;
      position: relative;
      z-index: 4;
    }

    p {
      color: var(--sub);
      margin: 0 0 24px;
      font-size: 16px;
      line-height: 1.5;
      font-family: var(--font-en-body);
      position: relative;
      z-index: 4;
    }

    .grid {
      display: grid;
      gap: 14px;
      position: relative;
      z-index: 4;
    }

    label {
      font-size: 14px;
      color: #f6f8ff;
      display: block;
      font-family: var(--font-en-body);
    }

    input,
    textarea {
      width: 100%;
      margin-top: 8px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.05);
      color: white;
      border-radius: 16px;
      padding: 15px 16px;
      font-size: 16px;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      font-family: var(--font-th), var(--font-en-body), sans-serif;
      position: relative;
      z-index: 4;
    }

    input::placeholder,
    textarea::placeholder {
      color: rgba(233, 240, 255, 0.4);
      font-family: var(--font-th), var(--font-en-body), sans-serif;
    }

    input:focus,
    textarea:focus {
      border-color: rgba(143,176,255,0.6);
      box-shadow: 0 0 0 4px rgba(143,176,255,0.12);
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .simple-upload input[type="file"] {
      padding: 12px;
      cursor: pointer;
    }

    .simple-upload input[type="file"]::-webkit-file-upload-button {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      margin-right: 12px;
      font-weight: 700;
      background: #ffffff;
      color: #002c67;
      cursor: pointer;
    }

    .simple-upload input[type="file"]::file-selector-button {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      margin-right: 12px;
      font-weight: 700;
      background: #ffffff;
      color: #002c67;
      cursor: pointer;
    }

    button {
      border: 0;
      width: 100%;
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 16px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: var(--button-text);
      cursor: pointer;
      margin-top: 8px;
      box-shadow: 0 14px 34px rgba(82, 126, 214, 0.22);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 56px;
      transition: transform .15s ease, opacity .2s ease;
      touch-action: manipulation;
      font-family: var(--font-en-body);
      position: relative;
      z-index: 4;
    }

    button:active { transform: scale(0.995); }
    button:disabled {
      opacity: 0.72;
      cursor: not-allowed;
    }

    .loader {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(0,44,103,0.25);
      border-top-color: #002c67;
      border-radius: 50%;
      display: none;
      animation: spin .8s linear infinite;
    }

    .loader.show { display: inline-block; }

    .ok,
    .err {
      display: none;
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.5;
      font-family: var(--font-th), var(--font-en-body), sans-serif;
      position: relative;
      z-index: 4;
    }

    .ok {
      background: var(--success-bg);
      color: var(--success-text);
    }

    .err {
      background: var(--danger-bg);
      color: var(--danger-text);
    }

    .note {
      margin-top: 14px;
      font-size: 13px;
      color: var(--sub);
      line-height: 1.5;
      font-family: var(--font-en-body);
      position: relative;
      z-index: 4;
    }

    .burst {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 20;
      overflow: hidden;
    }

    .burst-star {
      position: absolute;
      font-size: 22px;
      opacity: 0;
      animation: burstFly 900ms ease-out forwards;
      color: #fff;
      text-shadow:
        0 0 10px rgba(255,255,255,1),
        0 0 20px rgba(219,232,255,0.75);
    }

    .burst-star.gold {
      color: var(--star-gold);
      text-shadow:
        0 0 10px rgba(255,231,168,1),
        0 0 20px rgba(255,211,110,0.8);
    }

    @keyframes starFall {
      0% {
        transform: translate3d(0, -16vh, 0) scale(.88);
        opacity: 0;
      }
      8% { opacity: .98; }
      45% { opacity: .88; }
      100% {
        transform: translate3d(var(--drift-x), 120vh, 0) scale(1.08);
        opacity: 0;
      }
    }

    @keyframes starTwinkle {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.65); }
    }

    @keyframes starSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes burstFly {
      0% {
        transform: translate(0,0) scale(.5);
        opacity: 1;
      }
      100% {
        transform: translate(var(--x),var(--y)) scale(1.2) rotate(220deg);
        opacity: 0;
      }
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    @keyframes titleGlow {
      0%, 100% { opacity: 0.96; }
      50% { opacity: 1; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

@media (max-width: 640px) {
  body {
    padding:
      max(12px, env(safe-area-inset-top))
      12px
      12px
      12px;
    background:
      linear-gradient(rgba(0,44,103,0.28), rgba(0,44,103,0.38)),
      url('/sworld-stage.jpg') center/cover no-repeat;
  }
}
      .page {
        min-height: auto;
        display: block;
      }

      .wrap {
        border-radius: 24px;
        padding: 20px 18px;
        margin: 4px 0 18px;
      }

      .brand img {
        width: 82px;
        height: 82px;
      }

      h1 {
        font-size: clamp(30px, 9vw, 40px);
      }

      input,
      textarea,
      button {
        font-size: 16px;
      }

      label {
        font-size: 15px;
      }

      .sparkle {
        width: 16px;
        height: 16px;
      }

      .sparkle.big::before { font-size: 24px; }
      .sparkle.small::before { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="sparkle-rain-back" aria-hidden="true">
    <span class="sparkle back big gold trail d1 b1"></span>
    <span class="sparkle back d4 b2"></span>
    <span class="sparkle back small d5 b3"></span>
    <span class="sparkle back big gold trail d2 b4"></span>
    <span class="sparkle back d4 b5"></span>
    <span class="sparkle back small gold d3 b6"></span>
    <span class="sparkle back big trail d1 b7"></span>
    <span class="sparkle back d5 b8"></span>
  </div>

  <div class="page">
    <div class="wrap">
      <div class="brand">
        <img src="/sworld-logo.png" alt="Sworld logo" />
        <div>
          <strong>Welcome to Sworld</strong>
          <small>Wedding Night</small>
        </div>
      </div>

      <form id="joinForm" class="grid" novalidate>
        <label>
          Your name
          <input id="nameInput" name="name" placeholder="e.g. Vee" required maxlength="60" />
        </label>

        <label>
          IG Name (*Optional)
          <input id="igInput" name="ig" placeholder="e.g. Sworld_ig" maxlength="60" />
        </label>

        <label>
          Your message
          <textarea id="message" name="message" placeholder="เขียนคำอวยพร หรือข้อความสั้นๆ ได้ตามสบาย" maxlength="250"></textarea>
        </label>

        <label class="simple-upload">
          Upload photo
          <input id="photoInput" type="file" name="photo" accept="image/*" />
        </label>

        <button type="submit" id="submitBtn">
          <span id="submitText">Join to Sworld</span>
          <span id="submitLoader" class="loader"></span>
        </button>
      </form>

      <div class="ok" id="okBox">Submitted successfully. Your profile is ready for the screen ✨</div>
      <div class="err" id="errBox"></div>
    </div>
  </div>

  <div class="sparkle-rain-front" aria-hidden="true">
    <span class="sparkle front big gold trail d1 f1"></span>
    <span class="sparkle front d4 f2"></span>
    <span class="sparkle front small gold trail d2 f3"></span>
    <span class="sparkle front big d3 f4"></span>
    <span class="sparkle front gold trail d2 f5"></span>
    <span class="sparkle front big gold d5 f6"></span>
    <span class="sparkle front small trail d1 f7"></span>
    <span class="sparkle front d4 f8"></span>

    <span class="sparkle front big gold trail d1 b1"></span>
    <span class="sparkle front d4 b2"></span>
    <span class="sparkle front big gold trail d2 b4"></span>
    <span class="sparkle front big trail d1 b7"></span>
    <span class="sparkle front d5 b8"></span>
  </div>

  <script>
    const form = document.getElementById('joinForm');
    const okBox = document.getElementById('okBox');
    const errBox = document.getElementById('errBox');
    const submitBtn = document.getElementById('submitBtn');
    const submitText = document.getElementById('submitText');
    const submitLoader = document.getElementById('submitLoader');
    const nameInput = document.getElementById('nameInput');
    const igInput = document.getElementById('igInput');
    const messageInput = document.getElementById('message');

    let isSubmitting = false;

    function showError(message) {
      okBox.style.display = 'none';
      errBox.textContent = message;
      errBox.style.display = 'block';
    }

    function hideMessages() {
      okBox.style.display = 'none';
      errBox.style.display = 'none';
    }

    function setSubmitState(loading, text) {
      submitBtn.disabled = loading;
      submitText.textContent = text;
      submitLoader.classList.toggle('show', loading);
    }

    function normalizeIgValue(value) {
      return String(value || '').trim().replace(/^@+/, '');
    }

    function validateForm() {
      const name = String(nameInput.value || '').trim();
      const ig = normalizeIgValue(igInput.value);
      const message = String(messageInput.value || '').trim();

      if (!name) throw new Error('Please enter your name');
      if (name.length > 60) throw new Error('Name is too long');
      if (ig.length > 60) throw new Error('IG name is too long');
      if (message.length > 250) throw new Error('Message is too long');

      return { name, ig, message };
    }

    function sparkleBurst(x, y) {
      const burst = document.createElement('div');
      burst.className = 'burst';
      document.body.appendChild(burst);

      for (let i = 0; i < 16; i++) {
        const s = document.createElement('div');
        const isGold = Math.random() > 0.55;
        s.className = 'burst-star' + (isGold ? ' gold' : '');
        s.textContent = '✦';

        const angle = Math.random() * Math.PI * 2;
        const dist = 80 + Math.random() * 120;
        s.style.left = x + 'px';
        s.style.top = y + 'px';
        s.style.setProperty('--x', Math.cos(angle) * dist + 'px');
        s.style.setProperty('--y', Math.sin(angle) * dist + 'px');
        burst.appendChild(s);
      }

      setTimeout(() => burst.remove(), 900);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();
      if (isSubmitting) return;

      try {
        validateForm();
      } catch (error) {
        showError(error.message);
        return;
      }

      isSubmitting = true;
      setSubmitState(true, 'Submitting...');

      try {
        const formData = new FormData(form);
        formData.set('ig', normalizeIgValue(igInput.value));

        const response = await fetch('/api/entries', {
          method: 'POST',
          body: formData
        });

        let data = {};
        try {
          data = await response.json();
        } catch (_) {}

        if (!response.ok) {
          throw new Error(data.error || 'Submit failed');
        }

        okBox.style.display = 'block';
        sparkleBurst(window.innerWidth / 2, window.innerHeight / 2);
        form.reset();
      } catch (error) {
        showError(error.message || 'Submit failed');
      } finally {
        isSubmitting = false;
        setSubmitState(false, 'Join to Sworld');
      }
    });

    ['touchstart', 'touchmove', 'wheel'].forEach((eventName) => {
      document.addEventListener(eventName, () => {}, { passive: true });
    });
  </script>
</body>
</html>
