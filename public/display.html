<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sworld Display</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --font-th: 'Prompt', sans-serif;
      --font-en-body: 'Montserrat', sans-serif;
      --font-en-heading: 'Feeling Passionate', cursive;
      --text: #ffffff;
      --sub: rgba(255,255,255,0.85);
      --accent: #ffffff;
      --accent-2: #dbe8ff;
      --panel: rgba(255,255,255,0.05);
      --line: rgba(255,255,255,0.12);
      --star-white: #ffffff;
      --star-ice: #dbe8ff;
      --star-gold: #ffe7a8;
      --star-gold-soft: #ffd36e;
    }

    @font-face {
      font-family: 'Feeling Passionate';
      src: url('/fonts/feeling-passionate.woff2') format('woff2'),
           url('/fonts/feeling-passionate.woff') format('woff');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-th), var(--font-en-body), sans-serif;
      color: var(--text);
      background: linear-gradient(rgba(0,44,103,0.22), rgba(0,44,103,0.32)), url('/sworld-stage.jpg') center/cover no-repeat fixed;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(2px 2px at 8% 18%, rgba(255,255,255,0.55), transparent 55%),
        radial-gradient(2px 2px at 16% 8%, rgba(255,255,255,0.45), transparent 55%),
        radial-gradient(1.5px 1.5px at 22% 32%, rgba(255,255,255,0.40), transparent 55%),
        radial-gradient(2px 2px at 37% 14%, rgba(255,255,255,0.35), transparent 55%),
        radial-gradient(1.5px 1.5px at 52% 10%, rgba(255,255,255,0.50), transparent 55%),
        radial-gradient(2px 2px at 70% 16%, rgba(255,255,255,0.38), transparent 55%),
        radial-gradient(1.5px 1.5px at 78% 30%, rgba(255,255,255,0.42), transparent 55%),
        radial-gradient(2px 2px at 90% 12%, rgba(255,255,255,0.48), transparent 55%);
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    /* layer หลัง panel */
    .sparkle-rain-back {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    /* layout หลัก */
    .layout {
      position: relative;
      z-index: 3;
      display: grid;
      grid-template-columns: 1fr 1.35fr 1fr;
      height: 100vh;
      gap: 22px;
      padding: 24px;
    }

    /* layer หน้า panel */
    .sparkle-rain-front {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 7;
      overflow: hidden;
    }

.sparkle {
  position: absolute;
  top: -16%;
  width: 24px;
  height: 24px;
  opacity: 0;
  will-change: transform, opacity, filter;
  animation-name: starFall, starTwinkle;
  animation-timing-function: linear, ease-in-out;
  animation-iteration-count: infinite, infinite;
}

.sparkle::before {
  content: "✦";
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  animation: starSpin 8s linear infinite;
  line-height: 1;
  color: var(--star-white);
  text-shadow:
    0 0 10px rgba(255,255,255,0.98),
    0 0 22px rgba(255,255,255,0.75),
    0 0 40px rgba(219,232,255,0.75);
  transform-origin: center;
  animation: starSpin 8s linear infinite;
}

    .sparkle.gold::before {
      color: var(--star-gold);
      text-shadow:
        0 0 10px rgba(255,231,168,0.98),
        0 0 20px rgba(255,211,110,0.75),
        0 0 38px rgba(255,211,110,0.55);
    }

    .sparkle.big::before {
      font-size: 34px;
    }

    .sparkle.small::before {
      font-size: 18px;
    }

    .sparkle.front::before {
      text-shadow:
        0 0 12px rgba(255,255,255,1),
        0 0 28px rgba(255,255,255,0.95),
        0 0 52px rgba(219,232,255,0.88);
    }

    .sparkle.front.gold::before {
      text-shadow:
        0 0 12px rgba(255,231,168,1),
        0 0 28px rgba(255,211,110,0.95),
        0 0 54px rgba(255,211,110,0.72);
    }

    .sparkle.back {
      filter: blur(.15px);
      opacity: 0.92;
    }

    /* หางดาวให้เห็นชัด */
   .sparkle.trail::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 56%;
  width: 2px;
  height: 90px;
  transform: translateX(-50%);
  border-radius: 999px;
  background: linear-gradient(
    to bottom,
    rgba(255,255,255,0.42) 0%,
    rgba(255,255,255,0.22) 30%,
    rgba(219,232,255,0.10) 65%,
    rgba(219,232,255,0) 100%
  );
  filter: blur(0.8px);
  opacity: 0.55;
}

.sparkle.trail.gold::after {
  background: linear-gradient(
    to bottom,
    rgba(255,231,168,0.38) 0%,
    rgba(255,211,110,0.20) 32%,
    rgba(255,211,110,0.08) 65%,
    rgba(255,211,110,0) 100%
  );
}

    .sparkle.long-trail::after {
      height: 170px;
      width: 4px;
      opacity: 1;
    }

    /* random speed + delay */
    .d1 { animation-duration: 8.8s, 2.2s; }
    .d2 { animation-duration: 9.6s, 2.9s; }
    .d3 { animation-duration: 10.4s, 2.4s; }
    .d4 { animation-duration: 11.2s, 3.1s; }
    .d5 { animation-duration: 12.0s, 2.6s; }
    .d6 { animation-duration: 13.2s, 3.4s; }

    /* back positions */
    .b1  { left: 4%;  animation-delay: 0s, .2s; }
    .b2  { left: 11%; animation-delay: 1.6s, .9s; }
    .b3  { left: 19%; animation-delay: 3.7s, .4s; }
    .b4  { left: 27%; animation-delay: .8s, 1.1s; }
    .b5  { left: 36%; animation-delay: 4.6s, .3s; }
    .b6  { left: 46%; animation-delay: 2.1s, .8s; }
    .b7  { left: 55%; animation-delay: 5.4s, .5s; }
    .b8  { left: 65%; animation-delay: 1.4s, 1.2s; }
    .b9  { left: 75%; animation-delay: 3.2s, .6s; }
    .b10 { left: 84%; animation-delay: .3s, 1s; }
    .b11 { left: 91%; animation-delay: 4.9s, .4s; }

    /* front positions */
    .f1  { left: 8%;  animation-delay: .7s, .2s; }
    .f2  { left: 17%; animation-delay: 2.4s, .9s; }
    .f3  { left: 25%; animation-delay: 5.2s, .4s; }
    .f4  { left: 34%; animation-delay: 1.1s, 1.1s; }
    .f5  { left: 43%; animation-delay: 3.8s, .3s; }
    .f6  { left: 52%; animation-delay: .2s, .8s; }
    .f7  { left: 61%; animation-delay: 6.1s, .5s; }
    .f8  { left: 70%; animation-delay: 2.9s, 1.2s; }
    .f9  { left: 79%; animation-delay: 4.1s, .6s; }
    .f10 { left: 88%; animation-delay: 1.7s, 1s; }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 30px;
      padding: 24px;
      backdrop-filter: blur(14px);
      position: relative;
      overflow: hidden;
      box-shadow: 0 22px 60px rgba(0,0,0,0.28);
      z-index: 3;
    }

    .panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent 24%);
      pointer-events: none;
    }

    .header-note {
      display: flex;
      align-items: center;
      gap: 18px;
      color: var(--sub);
      font-size: 22px;
      font-weight: 600;
      font-family: var(--font-en-body);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      width: fit-content;
      padding: 10px 14px;
      border-radius: 16px;
      position: relative;
      z-index: 4;
    }

    .header-note img {
      width: 90px;
      height: 90px;
      object-fit: contain;
    }

    .title {
      font-family: var(--font-th);
      font-size: 28px;
      line-height: 1.1;
      margin: 14px 0 10px;
      position: relative;
      z-index: 4;
    }

    .title-en {
      font-family: var(--font-en-heading);
      font-size: 42px;
      line-height: 1.05;
      margin: 8px 0 6px;
      font-weight: normal;
      letter-spacing: 0.01em;
      position: relative;
      z-index: 4;
    }

    .name {
      font-size: clamp(22px, 2vw, 30px);
      font-weight: 800;
      margin: 20px 0 14px;
      word-break: break-word;
      transition: opacity .25s ease, transform .25s ease;
      will-change: opacity, transform;
      font-family: var(--font-th);
      position: relative;
      z-index: 4;
    }

    .ig {
      font-size: clamp(22px, 1.9vw, 30px);
      color: var(--accent);
      margin-bottom: 24px;
      font-weight: 700;
      transition: opacity .25s ease, transform .25s ease;
      will-change: opacity, transform;
      font-family: var(--font-en-body);
      position: relative;
      z-index: 4;
    }

    .msg {
      font-size: clamp(22px, 1.9vw, 30px);
      max-width: 28ch;
      color: var(--sub);
      margin-top: 28px;
      line-height: 1.55;
      letter-spacing: 0.02em;
      font-weight: 700;
      transition: opacity .25s ease, transform .25s ease;
      will-change: opacity, transform;
      font-family: var(--font-th);
      position: relative;
      z-index: 4;
    }

    .qr-header {
      justify-content: flex-start;
      font-size: 22px;
      width: 100%;
    }

    .photo-wrap {
      height: 100%;
      display: grid;
      place-items: center;
      position: relative;
    }

    .photo {
      width: min(68vh, 100%);
      max-height: calc(100vh - 96px);
      aspect-ratio: 3 / 4;
      object-fit: contain;
      border-radius: 36px;
      border: 2px solid rgba(255,255,255,0.14);
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
      background: #14213c;
      transition: opacity .3s ease, transform .3s ease;
      will-change: opacity, transform;
      position: relative;
      z-index: 4;
    }

    .qr-box {
      display: grid;
      gap: 18px;
      justify-items: center;
      text-align: center;
      align-content: center;
      margin-top: 40px;
      position: relative;
      z-index: 4;
    }

    .qr {
      width: 200px;
      height: 200px;
      background: #fff;
      padding: 12px;
      border-radius: 20px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.28);
    }

    .small {
      font-size: 14px;
      color: var(--sub);
      word-break: break-all;
      font-family: var(--font-en-body);
    }

    .counter {
      position: absolute;
      bottom: 22px;
      left: 24px;
      font-size: 14px;
      color: var(--sub);
      font-family: var(--font-en-body);
      z-index: 4;
    }

    .fade-enter {
      opacity: 0;
      transform: translateY(8px) scale(.992);
    }

    .fade-enter-active {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    @keyframes starFall {
      0% {
        transform: translate3d(0, -16vh, 0) rotate(0deg) scale(.88);
        opacity: 0;
      }
      8% {
        opacity: .98;
      }
      45% {
        opacity: .9;
      }
      100% {
        transform: translate3d(-46px, 120vh, 0) rotate(720deg) scale(1.08);
        opacity: 0;
      }
    }

    @keyframes starTwinkle {
      0%, 100% {
        filter: brightness(1);
      }
      50% {
        filter: brightness(1.72);
      }
    }
  </style>
</head>
<body>
  <!-- stars behind panels -->
  <div class="sparkle-rain-back" aria-hidden="true">
    <span class="sparkle back big trail long-trail d2 b1"></span>
    <span class="sparkle back gold d4 b2"></span>
    <span class="sparkle back small d1 b3"></span>
    <span class="sparkle back big gold trail d5 b4"></span>
    <span class="sparkle back d3 b5"></span>
    <span class="sparkle back small gold d2 b6"></span>
    <span class="sparkle back big trail d6 b7"></span>
    <span class="sparkle back gold d1 b8"></span>
    <span class="sparkle back small d4 b9"></span>
    <span class="sparkle back big gold trail long-trail d5 b10"></span>
    <span class="sparkle back d2 b11"></span>
  </div>

  <div class="layout">
    <section class="panel">
      <div class="header-note">
        <img src="/sworld-logo.png" alt="Sworld logo" />
        <span>Welcome to Sworld</span>
      </div>

      <h1 class="title">อวยพรให้วีกับตั๋ง หรือ แจกวาร์ป!</h1>
      <div class="name" id="name">Waiting...</div>
      <div class="ig" id="ig">@guest</div>
      <div class="msg" id="message">Guests can submit from the QR code and appear here automatically.</div>
      <div class="counter" id="counter">0 profiles</div>
    </section>

    <section class="panel photo-wrap">
      <img class="photo" id="photo" src="/default-avatar.png" alt="Guest photo" />
    </section>

    <section class="panel">
      <div class="header-note qr-header">
        <img src="/sworld-logo.png" alt="Sworld logo" />
        <span>Add your profile</span>
      </div>

      <div class="qr-box">
        <div>
          <h2 class="title-en">Join</h2>
          <div class="small">QR opens the guest input page directly</div>
        </div>
        <img class="qr" id="qr" alt="QR code" />
        <div class="small" id="joinUrl">Loading QR...</div>
      </div>
    </section>
  </div>

  <!-- stars in front of panels -->
  <div class="sparkle-rain-front" aria-hidden="true">
    <span class="sparkle front big gold trail long-trail d3 f1"></span>
    <span class="sparkle front d1 f2"></span>
    <span class="sparkle front small gold trail d5 f3"></span>
    <span class="sparkle front big d4 f4"></span>
    <span class="sparkle front gold trail d2 f5"></span>
    <span class="sparkle front big gold d6 f6"></span>
    <span class="sparkle front small trail long-trail d3 f7"></span>
    <span class="sparkle front d5 f8"></span>
    <span class="sparkle front big gold trail d1 f9"></span>
    <span class="sparkle front small d4 f10"></span>
  </div>

  <script>
    const DEFAULT_ENTRY = {
      name: 'Waiting...',
      ig: 'guest',
      message: 'Guests can submit from the QR code and appear here automatically.',
      photo: '/default-avatar.png'
    };

    let entries = [];
    let index = 0;
    let rotateTimer = null;
    let refreshTimer = null;
    let isLoadingEntries = false;
    let lastEntriesSignature = '';
    let currentPhotoSrc = '';

    function makeSignature(list) {
      return JSON.stringify(
        list.map(item => ({
          id: item.id,
          ig: item.ig,
          message: item.message,
          photo: item.photo,
          createdAt: item.createdAt
        }))
      );
    }

    function safeText(value, fallback = '') {
      return String(value || fallback);
    }

    function preloadImage(src) {
      return new Promise((resolve) => {
        if (!src) {
          resolve('/default-avatar.png');
          return;
        }
        const img = new Image();
        img.onload = () => resolve(src);
        img.onerror = () => resolve('/default-avatar.png');
        img.src = src;
      });
    }

    function animateElements(elements) {
      elements.forEach(el => {
        el.classList.remove('fade-enter', 'fade-enter-active');
        void el.offsetWidth;
        el.classList.add('fade-enter');
        requestAnimationFrame(() => {
          el.classList.add('fade-enter-active');
        });
      });
    }

    async function renderCard(item) {
      const name = document.getElementById('name');
      const ig = document.getElementById('ig');
      const message = document.getElementById('message');
      const photo = document.getElementById('photo');

      const nextPhotoSrc = await preloadImage(item.photo || '/default-avatar.png');

      name.textContent = safeText(item.name, 'Guest');

      const cleanIg = safeText(item.ig, '').replace(/^@/, '');
      ig.textContent = cleanIg ? '@' + cleanIg : '';

      message.textContent = safeText(item.message, 'Happy to celebrate with the couple tonight ✨');

      if (currentPhotoSrc !== nextPhotoSrc) {
        photo.src = nextPhotoSrc;
        currentPhotoSrc = nextPhotoSrc;
      }

      animateElements([name, ig, message, photo]);
    }

    async function loadEntries(forceRender = false) {
      if (isLoadingEntries) return;
      isLoadingEntries = true;

      try {
        const res = await fetch('/api/entries', { cache: 'no-store' });
        if (!res.ok) throw new Error('Failed to load entries');

        const data = await res.json();
        const nextEntries = Array.isArray(data) ? data : [];
        const signature = makeSignature(nextEntries);

        document.getElementById('counter').textContent = `${nextEntries.length} profiles`;

        if (!nextEntries.length) {
          entries = [];
          index = 0;
          lastEntriesSignature = '';
          await renderCard(DEFAULT_ENTRY);
          return;
        }

        const hasChanged = signature !== lastEntriesSignature;
        entries = nextEntries;
        lastEntriesSignature = signature;

        if (index >= entries.length) index = 0;

        if (forceRender || hasChanged) {
          await renderCard(entries[index]);
        }
      } catch (error) {
        console.error('loadEntries error:', error);
      } finally {
        isLoadingEntries = false;
      }
    }

    async function rotateNext() {
      if (!entries.length) return;

      if (entries.length === 1) {
        await renderCard(entries[0]);
        return;
      }

      index = (index + 1) % entries.length;
      await renderCard(entries[index]);
    }

    async function loadQr() {
      try {
        const res = await fetch('/api/qrcode', { cache: 'no-store' });
        if (!res.ok) throw new Error('Failed to load QR');

        const data = await res.json();
        document.getElementById('qr').src = data.qr;
        document.getElementById('joinUrl').textContent = data.url;
      } catch (error) {
        console.error('loadQr error:', error);
      }
    }

    function startRotation() {
      if (rotateTimer) clearInterval(rotateTimer);
      rotateTimer = setInterval(() => {
        rotateNext();
      }, 15000);
    }

    function startRefresh() {
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(() => {
        loadEntries(false);
      }, 20000);
    }

    async function init() {
      await loadQr();
      await loadEntries(true);
      startRotation();
      startRefresh();
    }

    document.getElementById('photo').addEventListener('error', function () {
      if (this.src !== `${window.location.origin}/default-avatar.png`) {
        this.src = '/default-avatar.png';
        currentPhotoSrc = '/default-avatar.png';
      }
    });

    init();
  </script>
</body>
</html>
