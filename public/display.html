<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sworld Display</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --font-th: 'Prompt', sans-serif;
      --font-en-body: 'Montserrat', sans-serif;
      --font-en-heading: 'Feeling Passionate', cursive;

      --text: #ffffff;
      --sub: rgba(255,255,255,0.85);
      --accent: #ffffff;
      --accent-2: #dbe8ff;

      --panel: rgba(255,255,255,0.025);
      --line: rgba(255,255,255,0.06);

      --star-white: #ffffff;
      --star-ice: #dbe8ff;
      --star-gold: #ffe7a8;
      --star-gold-soft: #ffd36e;
    }
.th {
  font-family: var(--font-th);
}
    @font-face {
      font-family: 'Feeling Passionate';
      src: url('/fonts/feeling-passionate.woff2') format('woff2'),
           url('/fonts/feeling-passionate.woff') format('woff');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

      body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-en-body), var(--font-th), sans-serif;
      color: var(--text);
      background:
      linear-gradient(rgba(0,44,103,0.22), rgba(0,44,103,0.32)),
      url('/sworld-stage.jpg') center/cover no-repeat fixed;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(2px 2px at 8% 18%, rgba(255,255,255,0.55), transparent 55%),
        radial-gradient(2px 2px at 16% 8%, rgba(255,255,255,0.45), transparent 55%),
        radial-gradient(1.5px 1.5px at 22% 32%, rgba(255,255,255,0.40), transparent 55%),
        radial-gradient(2px 2px at 37% 14%, rgba(255,255,255,0.35), transparent 55%),
        radial-gradient(1.5px 1.5px at 52% 10%, rgba(255,255,255,0.50), transparent 55%),
        radial-gradient(2px 2px at 70% 16%, rgba(255,255,255,0.38), transparent 55%),
        radial-gradient(1.5px 1.5px at 78% 30%, rgba(255,255,255,0.42), transparent 55%),
        radial-gradient(2px 2px at 90% 12%, rgba(255,255,255,0.48), transparent 55%);
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    .milky-way {
      position: fixed;
      inset: -20%;
      pointer-events: none;
      z-index: 12;
      overflow: hidden;
    }

    .milky-way::before {
      content: "";
      position: absolute;
      width: 180vmax;
      height: 22vmax;
      left: -130vmax;
      top: 18%;
      transform: rotate(-18deg);
      opacity: 0;
      background: linear-gradient(
        90deg,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,0.05) 20%,
        rgba(219,232,255,0.18) 40%,
        rgba(255,231,168,0.22) 50%,
        rgba(219,232,255,0.18) 60%,
        rgba(255,255,255,0.05) 80%,
        rgba(255,255,255,0) 100%
      );
      filter: blur(10px);
      mix-blend-mode: screen;
      animation: milkySweep 30s ease-in-out infinite;
    }

    .sparkle-rain-back,
    .sparkle-rain-front {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .sparkle-rain-back {
      z-index: 1;
    }

    .sparkle-rain-front {
      z-index: 15;
      perspective: 900px;
      transform-style: preserve-3d;
    }

    .layout {
      position: relative;
      z-index: 3;
      display: grid;
      grid-template-columns: 1fr 1.35fr 1fr;
      height: 100vh;
      gap: 22px;
      padding: 24px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 30px;
      padding: 24px;
      backdrop-filter: blur(5px);
      position: relative;
      overflow: hidden;
      box-shadow: 0 22px 60px rgba(0,0,0,0.28);
      z-index: 3;
    }

    .panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.01), transparent 24%);
      pointer-events: none;
    }

    .header-note {
      display: flex;
      align-items: center;
      gap: 18px;
      color: var(--sub);
      font-size: 22px;
      font-weight: 600;
      font-family: var(--font-en-body);
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.05);
      width: fit-content;
      padding: 10px 14px;
      border-radius: 16px;
      position: relative;
      z-index: 4;
    }

    .header-note img {
      width: 90px;
      height: 90px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .title {
      font-family: var(--font-th);
      font-size: 28px;
      line-height: 1.1;
      margin: 14px 0 10px;
      position: relative;
      z-index: 4;
    }

    .title-en {
      font-family: var(--font-en-heading);
      font-size: 42px;
      line-height: 1.05;
      margin: 8px 0 6px;
      font-weight: normal;
      letter-spacing: 0.01em;
      position: relative;
      z-index: 4;
    }

    .name {
      font-family: var(--font-en-body), var(--font-th);
      font-size: clamp(22px, 2vw, 30px);
      font-weight: 800;
      margin: 20px 0 14px;
      word-break: break-word;
      transition: opacity .25s ease, transform .25s ease;
      will-change: opacity, transform;
      position: relative;
      z-index: 4;
    }

    .ig {
      font-family: var(--font-en-body), var(--font-th);
      font-size: clamp(22px, 1.9vw, 30px);
      color: var(--accent);
      margin-bottom: 24px;
      font-weight: 700;
      transition: opacity .25s ease, transform .25s ease;
      will-change: opacity, transform;
      position: relative;
      z-index: 4;
    }

.msg {
  font-family: var(--font-en-body), var(--font-th);
  font-size: 30px;
  max-width: 28ch;
  color: var(--sub);
  margin-top: 28px;
  line-height: 1.55;
  letter-spacing: 0.02em;
  font-weight: 700;
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;

  overflow: hidden;
  word-break: break-word;
  height: 6.2em;
}

    .qr-header {
      justify-content: flex-start;
      font-size: 22px;
      width: 100%;
    }
    .qr-header span {
      line-height: 1.2;
    }
    .photo-wrap {
      height: 100%;
      display: grid;
      place-items: center;
      position: relative;
    }

    .photo {
      width: min(68vh, 100%);
      max-width: 100%;
      max-height: calc(100vh - 96px);
      aspect-ratio: 3 / 4;
      object-fit: contain;
      border-radius: 36px;
      border: 2px solid rgba(255,255,255,0.14);
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
      background: #14213c;
      transition: opacity .3s ease, transform .3s ease;
      will-change: opacity, transform;
      position: relative;
      z-index: 4;
    }

      .qr-box {
        display: grid;
        gap: 18px;
        justify-items: center;
        text-align: center;
        align-content: center;
        margin-top: 0;
        position: relative;
        z-index: 4;
        min-height: calc(100% - 120px);
    }

    .qr {
      width: 200px;
      height: 200px;
      background: #fff;
      padding: 12px;
      border-radius: 20px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.28);
      object-fit: contain;
    }

    .small {
      font-size: 14px;
      color: var(--sub);
      word-break: break-all;
      font-family: var(--font-en-body);
    }

    .counter {
      position: absolute;
      bottom: 22px;
      left: 24px;
      font-size: 14px;
      color: var(--sub);
      font-family: var(--font-en-body);
      z-index: 4;
    }

    .fade-enter {
      opacity: 0;
      transform: translateY(8px) scale(.992);
    }

    .fade-enter-active {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .sparkle {
      --fall-duration: 10s;
      --twinkle-duration: 2.8s;
      --spin-duration: 9s;
      --drift-x: -40px;
      --trail-height: 88px;
      --trail-width: 2px;
      --trail-opacity: 0.20;
      --trail-blur: 1px;

      position: absolute;
      top: -18%;
      width: 24px;
      height: 24px;
      opacity: 0;
      will-change: transform, opacity, filter;
      animation:
        starFall var(--fall-duration) linear infinite,
        starTwinkle var(--twinkle-duration) ease-in-out infinite;
    }

    .sparkle::before {
      content: "✦";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      line-height: 1;
      color: var(--star-white);
      transform-origin: center;
      animation: starSpin var(--spin-duration) linear infinite;
      text-shadow:
        0 0 10px rgba(255,255,255,0.98),
        0 0 22px rgba(255,255,255,0.74),
        0 0 40px rgba(219,232,255,0.72);
    }

    .sparkle.gold::before {
      color: var(--star-gold);
      text-shadow:
        0 0 10px rgba(255,231,168,0.98),
        0 0 22px rgba(255,211,110,0.68),
        0 0 38px rgba(255,211,110,0.50);
    }

    .sparkle.big::before {
      font-size: 34px;
    }

    .sparkle.small::before {
      font-size: 18px;
    }

    .sparkle.front::before {
      text-shadow:
        0 0 14px rgba(255,255,255,1),
        0 0 30px rgba(255,255,255,0.92),
        0 0 60px rgba(219,232,255,0.90);
    }

    .sparkle.front.gold::before {
      text-shadow:
        0 0 14px rgba(255,231,168,1),
        0 0 30px rgba(255,211,110,0.90),
        0 0 58px rgba(255,211,110,0.72);
    }

    .sparkle.back {
      filter: blur(0.2px);
      opacity: 0.72;
    }

    .sparkle.trail::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 52%;
      width: var(--trail-width);
      height: var(--trail-height);
      transform: translateX(-50%);
      transform-origin: bottom center;
      border-radius: 999px;
      opacity: var(--trail-opacity);
      filter: blur(var(--trail-blur));
      background: linear-gradient(
        to top,
        rgba(255,255,255,0.28) 0%,
        rgba(255,255,255,0.16) 26%,
        rgba(219,232,255,0.08) 58%,
        rgba(219,232,255,0) 100%
      );
    }

    .sparkle.trail.gold::after {
      background: linear-gradient(
        to top,
        rgba(255,231,168,0.24) 0%,
        rgba(255,211,110,0.15) 28%,
        rgba(255,211,110,0.07) 58%,
        rgba(255,211,110,0) 100%
      );
    }

    .sparkle.dive {
      animation:
        starDive var(--fall-duration) linear infinite,
        starTwinkle var(--twinkle-duration) ease-in-out infinite;
    }

    .sparkle.dive::before {
      filter:
        drop-shadow(0 0 10px rgba(255,255,255,0.90))
        drop-shadow(0 0 24px rgba(219,232,255,0.72));
    }

    .d1 {
      --fall-duration: 8.6s;
      --twinkle-duration: 2.0s;
      --spin-duration: 6.5s;
      --drift-x: -60px;
      --trail-height: 118px;
      --trail-width: 3px;
      --trail-opacity: 0.28;
      --trail-blur: 0.8px;
    }

    .d2 {
      --fall-duration: 9.4s;
      --twinkle-duration: 2.5s;
      --spin-duration: 7.2s;
      --drift-x: -52px;
      --trail-height: 102px;
      --trail-width: 2.5px;
      --trail-opacity: 0.24;
      --trail-blur: 0.9px;
    }

    .d3 {
      --fall-duration: 10.3s;
      --twinkle-duration: 2.3s;
      --spin-duration: 8s;
      --drift-x: -46px;
      --trail-height: 90px;
      --trail-width: 2px;
      --trail-opacity: 0.20;
      --trail-blur: 1px;
    }

    .d4 {
      --fall-duration: 11.2s;
      --twinkle-duration: 2.9s;
      --spin-duration: 9s;
      --drift-x: -38px;
      --trail-height: 78px;
      --trail-width: 2px;
      --trail-opacity: 0.16;
      --trail-blur: 1.1px;
    }

    .d5 {
      --fall-duration: 12.1s;
      --twinkle-duration: 3.1s;
      --spin-duration: 10.2s;
      --drift-x: -32px;
      --trail-height: 66px;
      --trail-width: 2px;
      --trail-opacity: 0.12;
      --trail-blur: 1.2px;
    }

    .d6 {
      --fall-duration: 13.4s;
      --twinkle-duration: 3.4s;
      --spin-duration: 11.4s;
      --drift-x: -26px;
      --trail-height: 56px;
      --trail-width: 1.5px;
      --trail-opacity: 0.10;
      --trail-blur: 1.3px;
    }

    .b1  { left: 12%; animation-delay: 1.6s, .9s; }
    .b2  { left: 46%; animation-delay: 2.1s, .8s; }
    .b3  { left: 78%; animation-delay: 3.2s, .6s; }

    .f1  { left: 8%;  animation-delay: .7s, .2s; }
    .f2  { left: 17%; animation-delay: 2.4s, .9s; }
    .f3  { left: 25%; animation-delay: 5.2s, .4s; }
    .f4  { left: 34%; animation-delay: 1.1s, 1.1s; }
    .f5  { left: 43%; animation-delay: 3.8s, .3s; }
    .f6  { left: 52%; animation-delay: .2s, .8s; }
    .f7  { left: 61%; animation-delay: 6.1s, .5s; }
    .f8  { left: 70%; animation-delay: 2.9s, 1.2s; }
    .f9  { left: 79%; animation-delay: 4.1s, .6s; }
    .f10 { left: 88%; animation-delay: 1.7s, 1s; }

    @keyframes starFall {
      0% {
        transform: translate3d(0, -16vh, 0) scale(.88);
        opacity: 0;
      }
      8% {
        opacity: .98;
      }
      45% {
        opacity: .88;
      }
      100% {
        transform: translate3d(var(--drift-x), 120vh, 0) scale(1.08);
        opacity: 0;
      }
    }

    @keyframes starDive {
      0% {
        transform: translate3d(0, -15vh, -500px) scale(.2);
        opacity: 0;
      }
      12% {
        opacity: 1;
      }
      55% {
        opacity: 1;
      }
      100% {
        transform: translate3d(var(--drift-x), 115vh, 320px) scale(2.2);
        opacity: 0;
      }
    }

    @keyframes starTwinkle {
      0%, 100% {
        filter: brightness(1);
      }
      50% {
        filter: brightness(1.65);
      }
    }

    @keyframes starSpin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes milkySweep {
      0%, 80%, 100% {
        transform: translateX(0) rotate(-18deg);
        opacity: 0;
      }
      85% {
        opacity: 0.25;
      }
      92% {
        transform: translateX(120vmax) rotate(-18deg);
        opacity: 0.35;
      }
    }

    @media (max-width: 1280px) {
      .layout {
        grid-template-columns: 1fr 1.1fr 1fr;
        gap: 18px;
        padding: 18px;
      }

      .title {
        font-size: 24px;
      }

      .title-en {
        font-size: 36px;
      }

      .header-note {
        font-size: 18px;
      }

      .header-note img {
        width: 72px;
        height: 72px;
      }

      .qr {
        width: 170px;
        height: 170px;
      }
    }
  </style>
</head>
<body>
  <div class="milky-way"></div>

  <div class="sparkle-rain-back" aria-hidden="true">
    <span class="sparkle back small d6 b1"></span>
    <span class="sparkle back d5 b2"></span>
    <span class="sparkle back small gold d4 b3"></span>
  </div>

  <div class="layout">
    <section class="panel">
      <div class="header-note">
        <img src="/sworld-logo.png" alt="Sworld logo" />
        <span>Welcome to Sworld</span>
      </div>

      <div class="name" id="name">Waiting...</div>
      <div class="ig" id="ig">@guest</div>
      <div class="msg" id="message">Guests can submit from the QR code and appear here automatically.</div>
      <div class="counter" id="counter">0 profiles</div>
    </section>

    <section class="panel photo-wrap">
      <img class="photo" id="photo" src="/default-avatar.png" alt="Guest photo" />
    </section>

    <section class="panel">
<div class="header-note qr-header">
  <img src="/sworld-logo.png" alt="Sworld logo" />
<span class="th">
อวยพรให้วีกับตั๋ง<br>
หรือ แจกวาร์ป!
</span>

</div>

      <div class="qr-box">
        <div>
          <h2 class="title-en">Scan to Join</h2>
        </div>
        <img class="qr" id="qr" alt="QR code" />
        <div class="small" id="joinUrl">Loading QR...</div>
      </div>
    </section>
  </div>

  <div class="sparkle-rain-front" aria-hidden="true">
    <span class="sparkle front big gold trail d1 f1"></span>
    <span class="sparkle front d5 f2"></span>
    <span class="sparkle front small gold trail d2 f3"></span>
    <span class="sparkle front big d4 f4"></span>
    <span class="sparkle front gold trail d3 f5"></span>
    <span class="sparkle front big gold d6 f6"></span>
    <span class="sparkle front small trail d1 f7"></span>
    <span class="sparkle front d5 f8"></span>
    <span class="sparkle front big gold trail d2 f9"></span>
    <span class="sparkle front small gold d4 f10"></span>

    <span class="sparkle front big gold trail dive d1" style="left:12%; animation-delay:7s, 1s;"></span>
    <span class="sparkle front dive d2" style="left:58%; animation-delay:12s, .6s;"></span>
    <span class="sparkle front big gold dive d3" style="left:84%; animation-delay:16s, .8s;"></span>
  </div>

  <script>
    const DEFAULT_ENTRY = {
      name: 'Waiting...',
      ig: 'guest',
      message: 'Guests can submit from the QR code and appear here automatically.',
      photo: '/default-avatar.png'
    };

    let entries = [];
    let index = 0;
    let rotateTimer = null;
    let refreshTimer = null;
    let isLoadingEntries = false;
    let lastEntriesSignature = '';
    let currentPhotoSrc = '';

    function makeSignature(list) {
      return JSON.stringify(
        list.map(item => ({
          id: item.id,
          ig: item.ig,
          message: item.message,
          photo: item.photo,
          createdAt: item.createdAt
        }))
      );
    }

    function safeText(value, fallback = '') {
      return String(value ?? fallback);
    }

    function preloadImage(src) {
      return new Promise((resolve) => {
        const fallback = '/default-avatar.png';

        if (!src) {
          resolve(fallback);
          return;
        }

        const img = new Image();
        img.onload = () => resolve(src);
        img.onerror = () => resolve(fallback);
        img.src = src;
      });
    }

    function animateElements(elements) {
      elements.forEach(el => {
        el.classList.remove('fade-enter', 'fade-enter-active');
        void el.offsetWidth;
        el.classList.add('fade-enter');

        requestAnimationFrame(() => {
          el.classList.add('fade-enter-active');
        });
      });
    }

    async function renderCard(item) {
      const name = document.getElementById('name');
      const ig = document.getElementById('ig');
      const message = document.getElementById('message');
      const photo = document.getElementById('photo');

      const nextPhotoSrc = await preloadImage(item.photo || '/default-avatar.png');

      const cleanName = safeText(item.name, '').trim();
      name.textContent = cleanName ? 'Guest : ' + cleanName : 'Guest';

      const cleanIg = safeText(item.ig, '').replace(/^@/, '');
      ig.textContent = cleanIg ? 'Follow IG : ' + cleanIg : '';

      message.textContent = safeText(
        item.message,
        'Happy to celebrate with the couple tonight ✨'
      );
         autoShrinkText(message);
      if (currentPhotoSrc !== nextPhotoSrc) {
        photo.src = nextPhotoSrc;
        currentPhotoSrc = nextPhotoSrc;
      }

      animateElements([name, ig, message, photo]);
    }

    async function loadEntries(forceRender = false) {
      if (isLoadingEntries) return;
      isLoadingEntries = true;

      try {
        const res = await fetch('/api/entries', { cache: 'no-store' });
        if (!res.ok) throw new Error('Failed to load entries');

        const data = await res.json();
        const nextEntries = Array.isArray(data) ? data : [];
        const signature = makeSignature(nextEntries);

        document.getElementById('counter').textContent = `${nextEntries.length} profiles`;

        if (!nextEntries.length) {
          entries = [];
          index = 0;
          lastEntriesSignature = '';
          await renderCard(DEFAULT_ENTRY);
          return;
        }

        const hasChanged = signature !== lastEntriesSignature;
        entries = nextEntries;
        lastEntriesSignature = signature;

        if (index >= entries.length) index = 0;

        if (forceRender || hasChanged) {
          await renderCard(entries[index]);
        }
      } catch (error) {
        console.error('loadEntries error:', error);
      } finally {
        isLoadingEntries = false;
      }
    }

    async function rotateNext() {
      if (!entries.length) return;

      if (entries.length === 1) {
        await renderCard(entries[0]);
        return;
      }

      index = (index + 1) % entries.length;
      await renderCard(entries[index]);
    }

    async function loadQr() {
      try {
        const res = await fetch('/api/qrcode', { cache: 'no-store' });
        if (!res.ok) throw new Error('Failed to load QR');

        const data = await res.json();

        if (data?.qr) {
          document.getElementById('qr').src = data.qr;
        }

        document.getElementById('joinUrl').textContent = data?.url || 'QR unavailable';
      } catch (error) {
        console.error('loadQr error:', error);
        document.getElementById('joinUrl').textContent = 'QR unavailable';
      }
    }

    function startRotation() {
      if (rotateTimer) clearInterval(rotateTimer);

      rotateTimer = setInterval(() => {
        rotateNext();
      }, 15000);
    }

    function startRefresh() {
      if (refreshTimer) clearInterval(refreshTimer);

      refreshTimer = setInterval(() => {
        loadEntries(false);
      }, 20000);
    }

    async function init() {
      await loadQr();
      await loadEntries(true);
      startRotation();
      startRefresh();
    }

    document.getElementById('photo').addEventListener('error', function () {
      const fallback = '/default-avatar.png';
      const current = this.getAttribute('src') || '';

      if (!current.endsWith(fallback)) {
        this.src = fallback;
        currentPhotoSrc = fallback;
      }
    });
function autoShrinkText(el) {

  const textLength = el.textContent.length;

  let size = 30;

  if (textLength > 140) size = 18;
  else if (textLength > 110) size = 20;
  else if (textLength > 80) size = 22;
  else if (textLength > 50) size = 24;
  else size = 30;

  el.style.fontSize = size + 'px';
}
    
    init();
  </script>
</body>
